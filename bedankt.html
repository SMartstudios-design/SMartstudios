<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedankt! · SMart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#06101f 0%,#0d1a30 50%,#1e4d8c 100%);min-height:100vh;display:grid;place-items:center;padding:30px;color:#fff;}
  .card{background:rgba(255,255,255,.06);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:60px 50px;max-width:540px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4);}
  .check{width:80px;height:80px;background:#0f9b6e;border-radius:50%;display:grid;place-items:center;margin:0 auto 28px;font-size:2.2rem;color:#fff;box-shadow:0 10px 30px rgba(15,155,110,.4);}
  h1{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:600;margin-bottom:16px;letter-spacing:-.02em;}
  p{color:#cdd6e3;font-size:1.1rem;line-height:1.65;margin-bottom:30px;}
  a{display:inline-block;background:#fff;color:#06101f;padding:14px 28px;border-radius:10px;font-weight:600;text-decoration:none;transition:.2s;}
  a:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.3);}
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Bedankt voor uw bericht</h1>
    <p>We hebben uw aanvraag goed ontvangen en nemen zo snel mogelijk contact met u op — meestal binnen één werkdag.</p>
    <a href="/">← Terug naar de website</a>
  </div>
</body>
</html>
